<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dicionário Local AI - Versão Pro</title>
    <script src="data_form.js"></script>
    <script src="data_extras.js"></script>
    <script src="data_dictionary.js"></script>
    <script src="data_logs.js"></script>
    <script src="data_audios.js"></script>
    <script src="data_enciclopedia.js"></script>
    <script src="data_conversations.js"></script>
    <script src="data_conversations_dois.js"></script>
     <script src="simulators.js" defer></script>
    <script src="main.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .found { color: #28a745; font-weight: bold; }
        .not-found { color: #dc3545; }
        #typing-input { border: 1px solid #ccc; min-height: 200px; padding: 15px; background: white; border-radius: 4px; font-size: 16px; outline: none; }
        .display-box { background: white; border: 1px solid #ddd; min-height: 100px; padding: 10px; margin: 10px 0; font-family: 'Segoe UI', sans-serif; font-size: 16px; border-radius: 4px; overflow-y: auto; max-height: 300px; }
        .toolbar { background: #eee; padding: 10px; border-radius: 4px 4px 0 0; border: 1px solid #ccc; border-bottom: none; display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-tool { cursor: pointer; padding: 5px 10px; border: 1px solid #bbb; background: white; border-radius: 3px; }
        .btn-tool:hover { background: #f0f0f0; }
        .ai-header { color: #007bff; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<div id="app-container" style="max-width: 1000px; margin: auto; padding: 20px; font-family: 'Segoe UI', Tahoma, sans-serif;">
    <h2 style="text-align:center; color: #333;">AI Dictation & Typing Professional</h2>
    
    <div style="background: #fdfdfe; padding: 20px; border-radius: 12px; border: 2px solid #007bff; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 25px;">
        <label style="color: #007bff; font-weight: bold; font-size: 1.1em;">🎤 Voice Command Center</label>
        <div id="transcript-box" class="display-box"></div>
        
        <div class="btn-group" style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;">
            <button id="start-btn" style="background: #28a745; color: white; padding: 12px 24px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold;">Iniciar Ditado</button>
            <button id="stop-btn" style="background: #dc3545; color: white; padding: 12px 24px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold;" disabled>Parar</button>
            <button id="lang-toggle" style="background: #6c757d; color: white; padding: 12px 24px; border-radius: 6px; border: none; cursor: pointer;">Language: PT</button>
            <button id="copy-to-typing" style="background: #007bff; color: white; padding: 12px 24px; border-radius: 6px; border: none; cursor: pointer;">Transferir para Editor ⬇️</button>
        </div>
        <p id="status" style="font-size: 13px; margin-top: 8px; color: #555; font-style: italic;">Pronto para ouvir...</p>
    </div>

    <h3 class="ai-header"><span>🤖</span> AI Encyclopedia & Tutor</h3>
    <input type="text" id="ai-search" style="width:100%; padding:12px; margin-bottom:10px; border: 1px solid #ccc; border-radius: 4px;" placeholder="Pesquisar termo ou 'relacione A com B'...">
    <div id="ai-box" class="display-box" style="min-height: 150px;">
        <div id="ai-content"><i>Aguardando comando ou busca...</i></div>
    </div>

    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">

    <h3>⌨️ Editor de Texto e Análise</h3>
    <div class="toolbar">
        <button class="btn-tool" onclick="execCmd('bold')"><b>B</b></button>
        <button class="btn-tool" onclick="execCmd('italic')"><i>I</i></button>
        <button class="btn-tool" onclick="execCmd('underline')"><u>U</u></button>
        <select id="template-select" class="btn-tool" onchange="loadTemplate()"></select>
        <button class="btn-tool" onclick="saveTemplate()">💾 Salvar Modelo</button>
        <div style="flex-grow: 1;"></div>
        <button class="btn-tool" onclick="exportToWord()" style="background: #e7f3ff;">📄 Word</button>
        <button class="btn-tool" onclick="exportToPDF()" style="background: #ffe7e7;">📕 PDF</button>
    </div>
    
    <div id="typing-input" contenteditable="true" placeholder="Comece a digitar aqui..."></div>
    
    <p style="margin-top: 15px; font-weight: bold; color: #555;">Visualização de Vocabulário:</p>
    <div id="typing-display" class="display-box" style="background: #f9f9f9; min-height: 60px;"></div>
</div>

  <button onclick="checkInternalLibrary()" style="padding:10px; background:blue; color:white;">
    Verificar Sincronização P5
</button>


<script>
    // --- INTERNAL VOICE DICTATION LOGIC ---
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const langBtn = document.getElementById('lang-toggle');
    const statusText = document.getElementById('status');
    const transcriptBox = document.getElementById('transcript-box');
    const typingInput = document.getElementById('typing-input');
    const transferBtn = document.getElementById('copy-to-typing');

    let currentLang = 'pt-BR';
    let isRecognizing = false;
    let capitalizeNext = false;

    const punctuationMap = { 
        "vírgula": ",", "comma": ",", "ponto final": ".", "nova linha": "<br><br>", "period": ".",
        "dois pontos": ":", "colon": ":", "ponto e vírgula": ";",
        "interrogação": "?", "question mark": "?", "exclamação": "!",
        "abre parênteses": "(", "fecha parênteses": ")", "aspas": '"'
    };

    const commandMap = {
        "novo parágrafo": "NEW_PARA", "new paragraph": "NEW_PARA",
        "apagar última palavra": "DEL_WORD", "delete last word": "DEL_WORD",
        "limpar tudo": "CLEAR", "clear all": "CLEAR",
        "maiúscula": "CAPS", "capitalize": "CAPS"
    };

    const ptVocabularyA = ["abaixo", "acima", "aberto", "abrir", "açúcar", "arquitetura", "projeto", "urbanismo"]; 

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    
    const setupRecognition = () => {
        recognition.lang = currentLang;
        recognition.continuous = true;
        recognition.interimResults = false;

        recognition.onresult = (event) => {
            const lastIndex = event.results.length - 1;
            let text = event.results[lastIndex][0].transcript.toLowerCase().trim();

            if (commandMap[text]) {
                const cmd = commandMap[text];
                if (cmd === "NEW_PARA") { transcriptBox.innerHTML += "<br><br>"; }
                if (cmd === "CLEAR") { transcriptBox.innerHTML = ""; }
                if (cmd === "CAPS") { capitalizeNext = true; statusText.innerText = "Próxima em maiúscula..."; }
                if (cmd === "DEL_WORD") {
                    let words = transcriptBox.innerText.trim().split(/\s+/);
                    words.pop();
                    processInput(words.join(" "), transcriptBox, false);
                }
                return;
            }

            for (const [key, value] of Object.entries(punctuationMap)) {
                text = text.replace(new RegExp(`\\b${key}\\b`, 'g'), value);
            }

            if (capitalizeNext) {
                text = text.charAt(0).toUpperCase() + text.slice(1);
                capitalizeNext = false;
            }

            processInput(text, transcriptBox, true);
        };

        recognition.onstart = () => {
            statusText.innerText = `🎤 Ouvindo (${currentLang})...`;
            startBtn.disabled = true; stopBtn.disabled = false;
            isRecognizing = true;
        };

        recognition.onend = () => {
            statusText.innerText = "Pausado.";
            startBtn.disabled = false; stopBtn.disabled = true;
            isRecognizing = false;
        };
    };

    setupRecognition();

    // Shared highlighting function
    function processInput(text, targetBox, append) {
        if (!text) return;
        const words = text.split(/(\s+|<br><br>)/g);
    let resultHTML = "";

       words.forEach(word => {
       
        if (word === "<br><br>") {
            resultHTML += word;
        } 
        // Se for apenas espaço, mantemos o espaço original
        else if (word.trim() === "") {
            resultHTML += word;
        } 
        // Processamento normal de palavras
        else {
            const cleanWord = word.replace(/[.,!?;:()"]/g, "").toLowerCase();
            const isFound = ptVocabularyA.includes(cleanWord);
            resultHTML += `<span class="${isFound ? 'found' : 'not-found'}">${word}</span>`;
        }
    });

    if (append) {
        // Adicionamos um espaço ao final apenas se o último item não for uma quebra de linha
        targetBox.innerHTML += resultHTML + (text.endsWith("<br><br>") ? "" : " ");
        targetBox.scrollTop = targetBox.scrollHeight;
    } else {
        targetBox.innerHTML = resultHTML;
    }
}

    startBtn.onclick = () => recognition.start();
    stopBtn.onclick = () => recognition.stop();

    langBtn.onclick = () => {
        currentLang = currentLang === 'en-US' ? 'pt-BR' : 'en-US';
        langBtn.innerText = currentLang === 'en-US' ? 'Language: EN' : 'Idioma: PT';
        if (isRecognizing) {
            recognition.stop();
            setTimeout(() => { setupRecognition(); recognition.start(); }, 400);
        } else {
            setupRecognition();
        }
    };

    transferBtn.onclick = () => {
        const content = transcriptBox.innerHTML;
        typingInput.focus();
        document.execCommand('insertHTML', false, (typingInput.innerHTML ? "<br>" : "") + content);
        transcriptBox.innerHTML = "";
        // Manually trigger the highlighting logic for the external editor
        if (window.onInputUpdate) window.onInputUpdate(); 
    };


    // Function to bridge the HTML file into your AI Library
async function bridgeHtmlToLibrary() {
    try {
        // 1. Fetch the raw HTML file from your GitHub/Server
        const response = await fetch('pagina_cinco.html');
        const htmlText = await response.text();

        // 2. Clean the HTML (Optional: Remove <html>/<body> tags to keep it as a partial)
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlText, 'text/html');
        const cleanContent = doc.body.innerHTML;

        // 3. Insert it into the BIBLIOTECA_CONVERSAS object
        BIBLIOTECA_CONVERSAS["instalacoes_eletricas_prediais_01_p5"] = {
            keywords: ["simulador", "NBR 5410", "quadro", "multímetro", "instalação"],
            fase: "INSTALAÇÕES E INFRAESTRUTURA URBANA",
            titulo: "Aula 1: Simulador de Instalação Residencial (Pág 5)",
            icone: "bolt",
            resumo: "Laboratório avançado carregado de arquivo externo.",
            html_content: cleanContent, // The code from your file is now here!
            pagina: "Aula 01 - Pág 5"
        };

        console.log("✅ Página 5 carregada com sucesso do arquivo HTML!");
    } catch (error) {
        console.error("❌ Erro ao carregar pagina_cinco.html:", error);
    }
}

// Run the bridge when the app starts
bridgeHtmlToLibrary();
    
function checkInternalLibrary() {
    if (BIBLIOTECA_CONVERSAS["instalacoes_eletricas_prediais_01_p5"]) {
        alert("Sucesso! O HTML da pagina_cinco foi importado para a biblioteca.");
        console.log("Conteúdo capturado:", BIBLIOTECA_CONVERSAS["instalacoes_eletricas_prediais_01_p5"].html_content);
    } else {
        alert("Ainda não carregou. Verifique se o nome do arquivo 'pagina_cinco.html' está correto no seu GitHub.");
    }
}
</script>
</body>
</html>
