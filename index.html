<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dicionário Local AI</title>
    <style>
        :root {
            --primary: #4a90e2;
            --bg: #f5f7fa;
            --card: #ffffff;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        #app-container {
            background: var(--card);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 95%;
            max-width: 600px;
        }
        #status {
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 1rem;
            text-align: center;
        }
        #transcript-box {
            min-height: 200px;
            border: 2px solid #eee;
            padding: 15px;
            border-radius: 10px;
            background: #fff;
            margin-bottom: 20px;
            line-height: 1.6;
            overflow-y: auto;
            max-height: 400px;
        }
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        #start-btn { background: #28a745; color: white; }
        #stop-btn { background: #dc3545; color: white; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .found { color: #28a745; font-weight: bold; }
        .not-found { color: #888; text-decoration: underline dotted; }
    </style>
</head>
<body>

<div id="app-container">
    <h2 style="text-align:center">AI Dictation (Offline Mode)</h2>
    <p id="status">Clique em Iniciar para ditar...</p>
    
    <div id="transcript-box">
        </div>

    <div class="controls">
        <button id="start-btn">Iniciar Ditado</button>
        <button id="stop-btn" disabled>Parar</button>
    </div>
</div>

<script>
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const statusText = document.getElementById('status');
    const transcriptBox = document.getElementById('transcript-box');

    // --- FIX IS HERE: Local Vocabulary Array ---
    const ptVocabularyA = [
        "abaixo", "acima", "aberto", "abrir", "abacate", "abacaxi", "abafar", 
        "abaixar", "abalar", "abanar", "abandonar", "abençoar", "abertura", 
        "abismo", "abóbora", "abotoar", "abraçar", "abraço", "abranger", 
        "abrigar", "abrigo", "abril", "absoluto", "absurdo", "abundância", 
        "acabar", "academia", "acalmar", "acampamento", "ação", "acaso", 
        "aceitar", "acenar", "acento", "acerto", "aceso", "achar", "acidente", 
        "ácido", "acionar", "aclarar", "acolher", "acomodar", "acompanhar", 
        "aconselhar", "acontecer", "acordar", "acordo", "acreditar", "açúcar"
    ];
    // --- END OF FIX ---

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();

    recognition.lang = 'pt-BR';
    recognition.continuous = true;
    recognition.interimResults = false;

    recognition.onstart = () => {
        statusText.innerText = "🎤 Ouvindo...";
        startBtn.disabled = true;
        stopBtn.disabled = false;
    };

    recognition.onresult = (event) => {
        const lastIndex = event.results.length - 1;
        const text = event.results[lastIndex][0].transcript.toLowerCase().trim();
        processInput(text);
    };

    recognition.onerror = (event) => {
        console.error("Erro de reconhecimento:", event.error);
        statusText.innerText = "❌ Erro: " + event.error;
    };

    recognition.onend = () => {
        statusText.innerText = "Ditado pausado.";
        startBtn.disabled = false;
        stopBtn.disabled = true;
    };

    function processInput(text) {
        const words = text.split(" ");
        let resultHTML = "";

        words.forEach(word => {
            if (ptVocabularyA.includes(word)) {
                resultHTML += `<span class="found">${word}</span> `;
            } else {
                resultHTML += `<span class="not-found">${word}</span> `;
            }
        });

        transcriptBox.innerHTML += resultHTML + "<br>";
        transcriptBox.scrollTop = transcriptBox.scrollHeight;
    }

    // --- FIX IS HERE: Advanced Permission Request ---
    startBtn.onclick = async () => {
        if (window.location.protocol === 'file:') {
            alert("Atenção: O microfone NÃO funciona abrindo o arquivo diretamente. Use um servidor local ou GitHub Pages.");
            statusText.innerText = "❌ Use um servidor local (localhost)";
            return;
        }

        try {
            // Solicita permissão explicitamente antes de iniciar
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            // Se chegou aqui, a permissão foi dada
            recognition.start();
            
            // Opcional: Para o stream imediatamente para deixar o recognition assumir
            stream.getTracks().forEach(track => track.stop());
            
        } catch (err) {
            console.error("Permissão de microfone negada:", err);
            statusText.innerText = "❌ Erro: Permissão de microfone negada.";
            alert("Por favor, permita o acesso ao microfone nas configurações do navegador (ícone de cadeado).");
        }
    };
    // --- END OF FIX ---

    stopBtn.onclick = () => {
        recognition.stop();
    };

</script>

</body>
</html>
