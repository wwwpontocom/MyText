<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dicionário Local AI</title>
    <style>
        :root {
            --primary: #4a90e2;
            --bg: #f5f7fa;
            --card: #ffffff;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        #app-container {
            background: var(--card);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 95%;
            max-width: 600px;
        }
        #status {
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 1rem;
            text-align: center;
        }
        .display-box {
            min-height: 150px;
            border: 2px solid #eee;
            padding: 15px;
            border-radius: 10px;
            background: #fff;
            margin-bottom: 20px;
            line-height: 1.6;
            overflow-y: auto;
            max-height: 300px;
        }
        #typing-input {
            width: 100%;
            height: 80px;
            margin-top: 10px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            box-sizing: border-box;
            resize: vertical;
        }
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        #start-btn { background: #28a745; color: white; }
        #stop-btn { background: #dc3545; color: white; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .found { color: #28a745; font-weight: bold; }
        .not-found { color: #888; text-decoration: underline dotted; }
        h3 { margin: 10px 0; color: #333; }
    </style>
</head>
<body>

<div id="app-container">
    <h2 style="text-align:center">AI Dictation & Typing</h2>
    
    <h3>🎤 Ditado por Voz</h3>
    <p id="status">Clique em Iniciar para ditar...</p>
    <div id="transcript-box" class="display-box"></div>
    <div class="controls">
        <button id="start-btn">Iniciar Ditado</button>
        <button id="stop-btn" disabled>Parar</button>
    </div>

    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">

    <h3>⌨️ Digitação Manual</h3>
    <div id="typing-display" class="display-box"></div>
    <textarea id="typing-input" placeholder="Digite algo aqui..."></textarea>
</div>

<script>
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const statusText = document.getElementById('status');
    const transcriptBox = document.getElementById('transcript-box');
    const typingInput = document.getElementById('typing-input');
    const typingDisplay = document.getElementById('typing-display');

    const ptVocabularyA = [
        "abaixo", "acima", "aberto", "abrir", "abacate", "abacaxi", "abafar", 
        "abaixar", "abalar", "abanar", "abandonar", "abençoar", "abertura", 
        "abismo", "abóbora", "abotoar", "abraçar", "abraço", "abranger", 
        "abrigar", "abrigo", "abril", "absoluto", "absurdo", "abundância", 
        "acabar", "academia", "acalmar", "acampamento", "ação", "acaso", 
        "aceitar", "acenar", "acento", "acerto", "aceso", "achar", "acidente", 
        "ácido", "acionar", "aclarar", "acolher", "acomodar", "acompanhar", 
        "aconselhar", "acontecer", "acordar", "acordo", "acreditar", "açúcar"
    ];

    // Lógica do Reconhecimento de Voz (Mantida conforme solicitado)
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'pt-BR';
    recognition.continuous = true;
    recognition.interimResults = false;

    recognition.onstart = () => {
        statusText.innerText = "🎤 Ouvindo...";
        startBtn.disabled = true;
        stopBtn.disabled = false;
    };

    recognition.onresult = (event) => {
        const lastIndex = event.results.length - 1;
        const text = event.results[lastIndex][0].transcript.toLowerCase().trim();
        processInput(text, transcriptBox, true);
    };

    recognition.onerror = (event) => {
        statusText.innerText = "❌ Erro: " + event.error;
    };

    recognition.onend = () => {
        statusText.innerText = "Ditado pausado.";
        startBtn.disabled = false;
        stopBtn.disabled = true;
    };

    // --- FIX IS HERE: Typing Box Logic ---
    typingInput.oninput = () => {
        const text = typingInput.value.toLowerCase();
        processInput(text, typingDisplay, false);
    };
    // --- END OF FIX ---

    function processInput(text, targetBox, append) {
        const words = text.split(/\s+/);
        let resultHTML = "";

        words.forEach(word => {
            const cleanWord = word.replace(/[.,!?;]/g, "");
            if (ptVocabularyA.includes(cleanWord)) {
                resultHTML += `<span class="found">${word}</span> `;
            } else {
                resultHTML += `<span class="not-found">${word}</span> `;
            }
        });

        if (append) {
            targetBox.innerHTML += resultHTML + "<br>";
            targetBox.scrollTop = targetBox.scrollHeight;
        } else {
            targetBox.innerHTML = resultHTML;
        }
    }

    startBtn.onclick = async () => {
        if (window.location.protocol === 'file:') {
            alert("Atenção: O microfone NÃO funciona via file://. Use um servidor local.");
            return;
        }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            recognition.start();
            stream.getTracks().forEach(track => track.stop());
        } catch (err) {
            statusText.innerText = "❌ Erro: Permissão negada.";
        }
    };

    stopBtn.onclick = () => {
        recognition.stop();
    };
</script>

</body>
</html>
