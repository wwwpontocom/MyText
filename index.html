<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dicionário Local AI</title>
    <script src="data_form.js"></script>
    <script src="data_extras.js"></script>
    <script src="data_dictionary.js"></script>
    <script src="data_.js"></script>
    <script src="data_.js"></script>
    <script src="data_.js"></script>
    <script src="data_logs.js"></script>
    <script src="data_audios.js"></script>
    <script src="data_.js"></script>
    <script src="data_.js"></script>
    <script src="data_enciclopedia.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app-container">
    <h2 style="text-align:center">AI Dictation & Typing</h2>
    
    <h3>🎤 Ditado por Voz</h3>
    <p id="status">Clique em Iniciar para ditar...</p>
    <div id="transcript-box" class="display-box"></div>
    <div class="controls">
        <button id="start-btn">Iniciar Ditado</button>
        <button id="stop-btn" disabled>Parar</button>
    </div>

    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">

    <h3 class="ai-header"><span>🤖</span> AI Encyclopedia</h3>
    <input type="text" id="ai-search" class="ai-search-input" placeholder="Pesquisar...">
    <div id="ai-box" class="display-box">
        <div id="ai-content"><i>Aguardando comando ou busca...</i></div>
    </div>

    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">

    <h3>⌨️ Digitação Manual</h3>
    <div id="typing-display" class="display-box"></div>

    <div class="toolbar">
        <button class="btn-tool" onclick="execCmd('bold')"><b>B</b></button>
        <button class="btn-tool" onclick="execCmd('italic')"><i>I</i></button>
        <button class="btn-tool" onclick="execCmd('underline')"><u>U</u></button>
        <select class="btn-tool" onchange="execCmd('fontName', this.value)">
            <option value="Segoe UI">Fonte</option>
            <option value="Arial">Arial</option>
            <option value="Calibri">Calibri</option>
            <option value="Courier New">Courier New</option>
            <option value="Georgia">Georgia</option>
            <option value="Verdana">Verdana</option>
        </select>

        <div style="border-left: 1px solid #ccc; margin: 0 5px; padding-left: 5px;">
        <select id="template-select" class="btn-tool">
            <option value="">Modelos...</option>
        </select>
        <button class="btn-tool" onclick="saveTemplate()" title="Salvar Modelo">💾 Salvar</button>
        <button class="btn-tool" onclick="loadTemplate()" title="Carregar Modelo">📂 Abrir</button>
    </div>
        <button class="btn-tool" onclick="exportToWord()" style="background: #e7f3ff; border-color: #7cc0ff;">📄 Word</button>
        <button class="btn-tool" onclick="exportToPDF()" style="background: #ffe7e7; border-color: #ff7c7c;">📕 PDF</button>
    </div>
    <div id="typing-input" contenteditable="true"></div>
</div>

<script>
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const statusText = document.getElementById('status');
    const transcriptBox = document.getElementById('transcript-box');
    const typingInput = document.getElementById('typing-input');
    const typingDisplay = document.getElementById('typing-display');

    const ptVocabularyA = ["abaixo", "acima", "aberto", "abrir", "abacate", "abacaxi", "abafar", "abaixar", "abalar", "abanar", "abandonar", "abençoar", "abertura", "abismo", "abóbora", "abotoar", "abraçar", "abraço", "abranger", "abrigar", "abrigo", "abril", "absoluto", "absurdo", "abundância", "acabar", "academia", "acalmar", "acampamento", "ação", "acaso", "aceitar", "acenar", "acento", "acerto", "aceso", "achar", "acidente", "ácido", "acionar", "aclarar", "acolher", "acomodar", "acompanhar", "aconselhar", "acontecer", "acordar", "acordo", "acreditar", "açúcar"];

    const punctuationMap = { "vírgula": ",", "ponto final": ".", "ponto": ".", "dois pontos": ":", "aspas": '"', "interrogação": "?", "exclamação": "!" };

    // --- INITIALIZE RECOGNITION FIRST ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'pt-BR';
    recognition.continuous = true;

    function handleSpelling(text) {
        const tokens = text.trim().split(/\s+/);
        let word = "";
        let makeUpper = false;
        tokens.forEach(token => {
            if (token === "maiúsculo" || token === "maiúscula") {
                makeUpper = true;
            } else {
                let char = token.charAt(0);
                word += makeUpper ? char.toUpperCase() : char.toLowerCase();
                makeUpper = false;
            }
        });
        return word;
    }

    // --- CONSOLIDATED ONRESULT LOGIC ---
    recognition.onresult = (event) => {
        const lastIndex = event.results.length - 1;
        let originalText = event.results[lastIndex][0].transcript.toLowerCase().trim();
        
        // 1. Line Break Logic
        if (originalText === "novo parágrafo" || originalText === "nova linha") {
            transcriptBox.innerHTML += "<br><br>";
            return;
        }

        // 2. Search Intent Logic
        if (originalText.startsWith("pesquisar")) {
            const termo = originalText.replace("pesquisar", "").trim();
            if(window.triggerSearch) window.triggerSearch(termo);
            return;
        }

        let processedText = "";
        const trigger = "comando soletrar";
        
        // 3. Spelling Logic vs Normal Dictation
        if (originalText.includes(trigger)) {
            const parts = originalText.split(trigger);
            let normalPart = parts[0].trim();
            for (const [key, value] of Object.entries(punctuationMap)) {
                normalPart = normalPart.replace(new RegExp(`\\b${key}\\b`, 'g'), value);
            }
            let spelledPart = handleSpelling(parts[1]);
            processedText = (normalPart ? normalPart + " " : "") + spelledPart;
        } else {
            processedText = originalText;
            for (const [key, value] of Object.entries(punctuationMap)) {
                processedText = processedText.replace(new RegExp(`\\b${key}\\b`, 'g'), value);
            }
        }
        
        processInput(processedText, transcriptBox, true);
    };

    function processInput(text, targetBox, append) {
        if (!text) return;
        const words = text.split(/\s+/);
        let resultHTML = "";
        words.forEach(word => {
            const cleanWord = word.replace(/[.,!?;:"]/g, "");
            resultHTML += ptVocabularyA.includes(cleanWord) ? `<span class="found">${word}</span> ` : `<span class="not-found">${word}</span> `;
        });
        if (append) { 
            targetBox.innerHTML += resultHTML + " "; 
            targetBox.scrollTop = targetBox.scrollHeight; 
        } else { 
            targetBox.innerHTML = resultHTML; 
        }
    }

    recognition.onstart = () => { statusText.innerText = "🎤 Ouvindo..."; startBtn.disabled = true; stopBtn.disabled = false; };
    recognition.onend = () => { statusText.innerText = "Ditado pausado."; startBtn.disabled = false; stopBtn.disabled = true; };

    startBtn.onclick = () => recognition.start();
    stopBtn.onclick = () => recognition.stop();
</script>

<script src="main.js"></script>

</body>
</html>
